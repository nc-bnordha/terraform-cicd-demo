name: Terraform using GCP Identify Federation for GitHub Action
on: [push]

jobs:
  cloudrun:
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest

    steps:
    # actions/checkout MUST come before auth
    - uses: 'actions/checkout@v3'
  
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v1'
      # Update the values with the output from the setup step
      with:
        workload_identity_provider: projects/783768662893/locations/global/workloadIdentityPools/github-pool/providers/github-provider
        service_account: github-sa@summer-music-496405-i6.iam.gserviceaccount.com

    - id: 'deploy'
      uses: 'google-github-actions/deploy-cloudrun@v1'
      with:
        service: 'hello-cloud-run'
        image: 'gcr.io/cloudrun/hello'
