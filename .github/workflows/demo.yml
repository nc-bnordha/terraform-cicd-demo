name: Terraform using GCP Identity Federation for GitHub Actions

on: [push]

jobs:
  plan:
    permissions:
      contents: read
      id-token: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/801348592277/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-sa@nc-terraform-bootstrap-demo-01.iam.gserviceaccount.com
          project_id: nc-terraform-cloudrun-demo-01

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          TF_VAR_project_id: nc-terraform-cloudrun-demo-01
        run: terraform plan -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  apply:
    needs: plan

    permissions:
      contents: read
      id-token: write

    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/801348592277/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-sa@nc-terraform-bootstrap-demo-01.iam.gserviceaccount.com
          project_id: nc-terraform-cloudrun-demo-01

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        env:
          TF_VAR_project_id: nc-terraform-cloudrun-demo-01
        run: terraform apply -auto-approve tfplan